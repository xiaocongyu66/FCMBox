name: fcm_box
description: "A new Flutter project."
publish_to: 'none'
version: 2.1.1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  dynamic_color: ^1.8.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  flutter_local_notifications: ^20.1.0
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  fluttertoast: ^9.0.0
  device_info_plus: ^12.3.0
  android_intent_plus: ^6.0.0
  http: ^1.1.0
  html: ^0.15.4
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  flutter_expandable_fab: ^2.5.2
  connectivity_plus: ^7.0.0
  open_filex: ^4.7.0
  cloudflare_turnstile: ^3.6.0
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/mode_heat.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/lang/
    - assets/icon/